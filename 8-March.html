<<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шақыру</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #fbc2eb, #a6c1ee);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            overflow: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 50px 60px;
            border-radius: 25px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.2);
            animation: fadeIn 1.2s ease;
        }

        h1 {
            font-size: 32px;
            color: #d63384;
            margin-bottom: 20px;
        }

        p {
            font-size: 18px;
            color: #444;
            margin-bottom: 15px;
        }

        .info {
            font-weight: 500;
            margin-top: 15px;
            color: #6a0572;
        }

        button {
            margin-top: 25px;
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            background: #d63384;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.1);
            background: #ad2167;
        }

        .hidden-message {
            margin-top: 20px;
            font-size: 17px;
            color: #333;
            display: none;
            animation: fadeIn 1s ease forwards;
        }

        @keyframes gradientBG {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);} 
            to {opacity: 1; transform: translateY(0);} 
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            animation: float 8s infinite ease-in-out;
        }

        .circle:nth-child(1) { width: 100px; height: 100px; top: 10%; left: 15%; }
        .circle:nth-child(2) { width: 150px; height: 150px; bottom: 15%; right: 10%; }
        .circle:nth-child(3) { width: 70px; height: 70px; bottom: 30%; left: 25%; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>

    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>

    <div class="card">
        <h1>Сендерге шақыру 🎉</h1>
        <p>Осы сенбі күні көңілді кішігірім отырыс болады.</p>
        <p class="info">📅 Сенбі
        <br>📍 Сыныптасымыз Алдиярдың үйінде</p>
        <button onclick="showMessage()">Толығырақ</button>
        <div class="hidden-message" id="message">
            Қыздар, бәріңді күтеміз! 🎀<br>
            Жақсы көңіл-күй алып келуді ұмытпаңдар 😊
        </div>
    </div>

    <script>
        function showMessage() {
            document.getElementById('message').style.display = 'block';
        }
    </script>

</body>
</html>
